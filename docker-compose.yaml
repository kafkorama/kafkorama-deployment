version: '3'

services:
  kafka:
    image: 'apache/kafka:3.9.2'
    networks:
      - local-network
    ports:
      - '9092:9092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://localhost:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true

  kafkorama-gateway:
    image: kafkorama/kafkorama-gateway:6.0.25
    restart: always
    ports:
      - "8800:8800"
    depends_on:
      - kafka
    networks:
      - local-network
    volumes:
      - ./kafkorama-gateway/addons/authorization-portal/configuration.properties:/kafkorama-gateway/addons/authorization-portal/configuration.properties
      - ./kafkorama-gateway/kafkorama-gateway.conf:/kafkorama-gateway/kafkorama-gateway.conf

  kafkorama-portal:
    image: kafkorama/kafkorama-portal:1.0.3
    restart: always
    depends_on:
      - kafkorama-gateway
    ports:
      - "8080:8080"
    networks:
      - local-network
    volumes:
      - ./data/db:/kafkorama-portal/data
      - ./kafkorama-portal/kafkorama-portal.conf:/kafkorama-portal/kafkorama-portal.conf

  demo-stocks:
    image: kafkorama/demo-stocks:1.0.1
    restart: always
    depends_on:
      - kafkorama-gateway
    networks:
      - local-network
    environment:
      - SERVER=kafkorama-gateway:8800
      - PORTAL_KEY=g4hD1hIgPDpcD//R22XFWXVEgt38Z5KI3QS9jHlnLnk=
      - PORTAL_URL=http://kafkorama-portal:8080
      - SYMBOLS_GET=/kafkorama/demo/stocks/symbols
      - SYMBOLS=/kafkorama/demo/stocks/AWERQ,/kafkorama/demo/stocks/WERZF,/kafkorama/demo/stocks/QWZAF,/kafkorama/demo/stocks/TEYDF,/kafkorama/demo/stocks/TYUII,/kafkorama/demo/stocks/XCVSD,/kafkorama/demo/stocks/POUVB,/kafkorama/demo/stocks/TYEWD,/kafkorama/demo/stocks/WYWUI

  demo-traffic:
    image: kafkorama/demo-traffic:1.0.1
    restart: always
    depends_on:
      - kafkorama-gateway
    networks:
      - local-network
    environment:
      - SERVER=kafkorama-gateway:8800
      - PORTAL_KEY=g4hD1hIgPDpcD//R22XFWXVEgt38Z5KI3QS9jHlnLnk=
      - PORTAL_URL=http://kafkorama-portal:8080
      - SUBJECT=/kafkorama/demo/traffic/brussels

  demo-cryptocurrency:
    image: kafkorama/demo-cryptocurrency:1.0.1
    restart: always
    depends_on:
      - kafkorama-gateway
    networks:
      - local-network
    environment:
      - SERVER=kafkorama-gateway:8800
      - PORTAL_KEY=g4hD1hIgPDpcD//R22XFWXVEgt38Z5KI3QS9jHlnLnk=
      - PORTAL_URL=http://kafkorama-portal:8080
      - SUBJECT=/kafkorama/demo/cryptocurrency/rates

  demo-parking:
    image: kafkorama/demo-parking:1.0.1
    restart: always
    depends_on:
      - kafkorama-gateway
    networks:
      - local-network
    environment:
      - SERVER=kafkorama-gateway:8800
      - PORTAL_KEY=g4hD1hIgPDpcD//R22XFWXVEgt38Z5KI3QS9jHlnLnk=
      - PORTAL_URL=http://kafkorama-portal:8080
      - SUBJECT=/kafkorama/demo/parking

  demo-seismic:
    image: kafkorama/demo-seismic:1.0.1
    restart: always
    depends_on:
      - kafkorama-gateway
    networks:
      - local-network
    environment:
      - SERVER=kafkorama-gateway:8800
      - PORTAL_KEY=g4hD1hIgPDpcD//R22XFWXVEgt38Z5KI3QS9jHlnLnk=
      - PORTAL_URL=http://kafkorama-portal:8080
      - SUBJECT=/kafkorama/demo/seismic/info

  demo-gamification:
    image: kafkorama/demo-gamification:1.0.1
    restart: always
    depends_on:
      - kafkorama-gateway
    networks:
      - local-network
    environment:
      - SERVER=kafkorama-gateway:8800
      - PORTAL_KEY=g4hD1hIgPDpcD//R22XFWXVEgt38Z5KI3QS9jHlnLnk=
      - PORTAL_URL=http://kafkorama-portal:8080
      - SUBJECTS_PREFIX=/kafkorama/demo/gamification

networks:
  local-network:
    driver: bridge

